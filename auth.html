<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ingreso al sistema</title>
  <link rel="shortcut icon" href="icono.ico" />
  <link rel="stylesheet" href="Formato.css" />
</head>
<body>
  <header class="site-header" role="banner">
    <img id="logo-sesver" src="Logos/sesver.png" alt="Logo SESVER" onerror="this.style.display='none';" />
  </header>

  <main class="auth-shell">
    <section class="card auth-card">
      <h1 class="page-title">Acceso al sistema</h1>
      <p class="auth-note">Cada usuario entra con su correo autorizado y queda asignado a un hospital.</p>

      <label class="field-label" for="email">Correo</label>
      <input id="email" type="email" placeholder="correo@hospital.gob.mx" autocomplete="email" />

      <label class="field-label" for="password">Contraseña</label>
      <input id="password" type="password" placeholder="Tu contraseña" autocomplete="current-password" />

      <div class="actions auth-actions">
        <button id="btnLogin">Entrar</button>
      </div>

      <div id="authMessage" class="status-line"></div>
    </section>
  </main>

  <script type="module" src="auth.js"></script>
</body>
</html>
